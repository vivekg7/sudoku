<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Blue background -->
  <rect width="1024" height="1024" rx="0" ry="0" fill="#1565C0"/>

  <!-- Open 3x3 grid (hash shape) - white lines, no outer border -->
  <!-- Vertical lines -->
  <rect x="365" y="220" width="22" height="584" rx="11" fill="white"/>
  <rect x="637" y="220" width="22" height="584" rx="11" fill="white"/>
  <!-- Horizontal lines -->
  <rect x="220" y="365" width="584" height="22" rx="11" fill="white"/>
  <rect x="220" y="637" width="584" height="22" rx="11" fill="white"/>

  <!-- "9" in center cell (cell center is at 501,501) -->
  <text x="501" y="510" text-anchor="middle" dominant-baseline="central"
        font-family="Helvetica, Arial, sans-serif" font-weight="600"
        font-size="190" fill="white">9</text>
</svg>
