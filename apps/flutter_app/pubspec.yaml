name: sudoku
description: "Offline Sudoku app with full solving engine and multi-layer hints."
publish_to: "none"
version: 1.3.0+4

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.5
  file_picker: ^10.3.10
  pdf: ^3.12.0
  printing: ^5.14.3
  mobile_scanner: ^7.2.0
  sudoku_core:
    path: ../../packages/sudoku_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  web:
    generate: true
  image_path: "assets/icon/icon_1024.png"
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icon/icon_1024.png"

flutter_native_splash:
  color: "#1565C0"
  color_dark: "#1565C0"
  image: "assets/icon/icon_1024.png"
  image_dark: "assets/icon/icon_1024.png"
  android: true
  ios: true
  web: true
  android_12:
    color: "#1565C0"
    color_dark: "#1565C0"
